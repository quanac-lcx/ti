services:
  mariadb:
    image: mariadb:11
    container_name: app-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-luogu_ti}
      MARIADB_USER: ${MARIADB_USER:-app}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-app}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: app-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    image: node:20-alpine
    container_name: app-api
    restart: unless-stopped
    working_dir: /app
    command: ["sh", "-c", "corepack enable && pnpm install && pnpm dev"]
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: ${MARIADB_USER:-app}
      DB_PASSWORD: ${MARIADB_PASSWORD:-app}
      DB_NAME: ${MARIADB_DATABASE:-luogu_ti}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./server:/app
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: node:20-alpine
    container_name: app-web
    restart: unless-stopped
    working_dir: /app
    command:
      [
        "sh",
        "-c",
        "corepack enable && pnpm install && pnpm dev -- --host 0.0.0.0 --port 5173"
      ]
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:${API_PORT:-3000}}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ./web:/app
    depends_on:
      - api

volumes:
  mariadb_data:
  redis_data:
